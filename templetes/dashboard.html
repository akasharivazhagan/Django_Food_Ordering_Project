{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">🍽️ Food Items</h3>

<div class="row">
  {% for food in foods %}
  <div class="col-md-3">
    <div class="card shadow-sm mb-4">
      <div class="card-body text-center">
        <h5>{{ food.name }}</h5>
        <p class="text-success fw-bold">₹{{ food.price }}</p>
        <a href="/add/{{food.id}}/" class="btn btn-primary btn-sm">Add to Cart</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

{% endblock %}
